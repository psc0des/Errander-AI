name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy errander/

  test:
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: errander
          POSTGRES_PASSWORD: errander
          POSTGRES_DB: errander_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U errander"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Create web role (least-privilege verification)
        env:
          PGPASSWORD: errander
        run: |
          psql -h localhost -U errander -d errander_test -c "
            CREATE ROLE errander_web WITH LOGIN PASSWORD 'ci_web';
            GRANT USAGE ON SCHEMA public TO errander_web;"

      - name: pytest (full suite)
        env:
          ERRANDER_TEST_DB_URL: "postgresql+asyncpg://errander:errander@localhost:5432/errander_test"
        run: |
          uv run pytest tests/ \
            --ignore=tests/ui \
            --ignore=tests/staging \
            -q --tb=short

      - name: Verify errander_web cannot INSERT on audit_events
        env:
          PGPASSWORD: ci_web
        run: |
          psql -h localhost -U errander_web -d errander_test \
            -c "INSERT INTO audit_events (event_type, batch_id, detail, timestamp, metadata) VALUES ('x','x','x','x','{}')" \
            && echo "FAIL: web role should be rejected" && exit 1 \
            || echo "OK: INSERT correctly rejected"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
