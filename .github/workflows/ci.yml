name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy errander/

  # TODO R4: add a second matrix leg here for PostgreSQL once the dual-backend
  # DB layer lands (§8c). The postgres job will add a services: postgres: block
  # and pass ERRANDER_AUDIT_DB_URL=postgresql://... to pytest.
  test:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: pytest
        run: |
          uv run pytest tests/ \
            --ignore=tests/ui \
            --ignore=tests/staging \
            -q --tb=short

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
