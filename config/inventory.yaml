environments:
  production:
    maintenance_window: "02:00-06:00 UTC"
    maintenance_days: [saturday]
    approval_policy: strict
    ssh_user: errander
    ssh_key_path: ~/.ssh/errander_prod
    targets:
      - host: 10.0.1.10
        name: web-prod-01
        os_family: ubuntu
        tags: [web, frontend]
      - host: 10.0.1.20
        name: db-prod-01
        os_family: rhel
        tags: [database]
        ssh_user: errander-db      # overrides group-level

  staging:
    maintenance_window: "00:00-06:00 UTC"
    maintenance_days: [daily]
    approval_policy: strict
    ssh_user: errander
    ssh_key_path: ~/.ssh/errander_staging
    targets:
      - host: 10.0.2.10
        name: web-stg-01
        os_family: ubuntu
        tags: [web]

  dev:
    maintenance_window: null
    maintenance_days: [daily]
    approval_policy: strict
    ssh_user: errander
    ssh_key_path: ~/.ssh/errander_dev
    targets:
      - host: 10.0.3.10
        name: web-dev-01
        os_family: debian
        tags: [web]
