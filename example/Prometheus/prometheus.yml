global:
  scrape_interval: 15s


scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "linux_nodes"
    static_configs:
      - targets:
          - "192.168.1.10:9100"  # replace with your target VM IPs
          - "192.168.1.11:9100"
        labels:
          env: "prod"

