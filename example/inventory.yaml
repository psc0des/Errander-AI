# Errander-AI Inventory — Example Configuration
#
# Structure:
#   environments:
#     <env-name>:
#       ssh_user: default SSH user for all hosts in this env
#       ssh_key_path: path to SSH private key (key-based auth only)
#       approval_policy: relaxed | moderate | strict
#       maintenance_window: "HH:MM-HH:MM" time range (agent timezone)
#       maintenance_days: list of weekday names
#       targets:
#         - host: IP or hostname (must be reachable via VPN)
#           name: human-readable VM name (shown in Slack reports)
#           os_family: ubuntu | debian | rhel
#           tags: optional labels for grouping
#           policy: override environment policy for this host (optional)
#           ssh_user: override environment ssh_user (optional)
#           ssh_key_path: override key path (optional)
#           critical_services: optional list of systemd service names checked pre/post
#             maintenance for health regressions.  Any service that transitions from
#             active → failed triggers a SERVICE_HEALTH_REGRESSION audit event.
#             No auto-restart — detection only.  Host-level list overrides env-level.
#           disable_failed_login_check: skip the failed SSH login probe for this host.
#             Useful for honeypots, bastion hosts, or jump boxes where high failure
#             counts are expected and would produce noisy false alerts.
#             Default: false (probe is enabled for all hosts).
#
#       actions:                         # Per-action opt-in (all optional, defaults shown)
#         patching:
#           enabled: true               # Headline feature — HITL Slack approval + maintenance window required
#         disk_cleanup:
#           enabled: true               # Bounded by whitelist + age threshold; safe to run automatically
#         log_rotation:
#           enabled: true               # Compresses logs; does not delete payload data
#         docker_prune:
#           enabled: false              # Off by default — requires wrapper install (see SETUP.md)
#           command_mode: disabled      # disabled | wrapper | direct_sudo
#           #   wrapper (recommended production mode): uses root-owned wrapper scripts at
#           #     /usr/local/sbin/errander-docker-{assess,prune-safe,prune-aggressive}.
#           #   direct_sudo: uses `sudo -n /usr/bin/docker ...` directly. Lab/pre-prod only.
#           #   disabled: Errander will not plan or execute docker_prune on this env.
#           # Run `scripts/install-docker-wrappers.sh` on each target to install wrappers.
#         backup_verify:
#           enabled: false              # Off by default — requires `backup:` section in settings.yaml
#
# Per-environment Prometheus/ELK URL overrides (all optional):
#   prometheus_url: http://10.0.1.100:9090   # overrides global ERRANDER_PROMETHEUS_BASE_URL
#   elk_url: http://10.0.1.101:9200          # overrides global ERRANDER_ELK_BASE_URL
#   elk_api_key: env-scoped-key              # overrides global ERRANDER_ELK_API_KEY
#   elk_index_pattern: prod-logs-*           # overrides global ERRANDER_ELK_INDEX_PATTERN
#
# Each field is resolved independently: set only the ones that differ from the global default.
# Useful when each environment has its own Prometheus/ELK cluster.
#
# Note: SSH keys are referenced by path. Never inline key material.
# The agent uses key-based auth only — passwords are not supported.

environments:

  production:
    ssh_user: errander
    ssh_key_path: ~/.ssh/errander_prod
    approval_policy: strict
    # Production uses a dedicated Prometheus instance — override the global URL here.
    # prometheus_url: http://10.0.1.100:9090
    # elk_url: http://10.0.1.101:9200
    # elk_index_pattern: prod-logs-*
    maintenance_window: "02:00-06:00"
    maintenance_days:
      - tuesday
      - thursday
    maintenance_timezone: UTC
    actions:
      patching:
        enabled: true
      disk_cleanup:
        enabled: true
      log_rotation:
        enabled: true
      docker_prune:
        # Skip this entire section if you are not enabling docker_prune.
        # Leave enabled: false and continue to the next environment.
        # To enable: install wrappers first — see SETUP.md#optional-docker-cleanup
        enabled: false
        command_mode: disabled
      backup_verify:
        enabled: false
    # Environment-wide critical services — applies to all hosts unless overridden.
    critical_services:
      - prometheus-node-exporter
      - ssh
    targets:
      - host: 10.0.1.10
        name: prod-web-01
        os_family: ubuntu
        tags: [web, prod, tier-1]
        # Host-level override: monitors nginx in addition to env defaults.
        critical_services:
          - nginx
          - prometheus-node-exporter
          - ssh

      - host: 10.0.1.11
        name: prod-web-02
        os_family: ubuntu
        tags: [web, prod, tier-1]

      - host: 10.0.1.20
        name: prod-db-01
        os_family: ubuntu
        tags: [database, prod, tier-1]
        policy: strict  # explicit — no automated actions, approval required for all
        critical_services:
          - postgresql
          - prometheus-node-exporter
          - ssh

      - host: 10.0.2.10
        name: prod-worker-01
        os_family: rhel
        tags: [worker, prod]

  staging:
    ssh_user: errander
    ssh_key_path: ~/.ssh/errander_staging
    approval_policy: strict
    # Staging shares the global Prometheus/ELK — no override needed.
    # Set prometheus_url / elk_url here if your staging cluster is separate.
    maintenance_window: "22:00-06:00"   # overnight window crosses midnight
    maintenance_timezone: UTC
    maintenance_days:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
    actions:
      patching:
        enabled: true
      disk_cleanup:
        enabled: true
      log_rotation:
        enabled: true
      docker_prune:
        enabled: false
        command_mode: disabled
      backup_verify:
        enabled: false
    targets:
      - host: 10.0.10.10
        name: staging-web-01
        os_family: ubuntu
        tags: [web, staging]

      - host: 10.0.10.20
        name: staging-worker-01
        os_family: debian
        tags: [worker, staging]

  dev:
    ssh_user: devops
    ssh_key_path: ~/.ssh/errander_dev
    approval_policy: strict
    maintenance_window: "08:00-20:00"   # broad window for dev
    maintenance_timezone: UTC
    maintenance_days:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday
    actions:
      patching:
        enabled: true
      disk_cleanup:
        enabled: true
      log_rotation:
        enabled: true
      docker_prune:
        enabled: false
        command_mode: disabled
      backup_verify:
        enabled: false
    targets:
      - host: 10.0.20.10
        name: dev-all-in-one
        os_family: ubuntu
        tags: [dev, all-in-one]
