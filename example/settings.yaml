# Errander-AI Settings — Example Configuration
#
# This file controls operational parameters. Secrets (tokens, keys, passwords)
# are NEVER in this file — they come from environment variables.
#
# Required environment variables:
#   ERRANDER_SLACK_BOT_TOKEN     Slack bot OAuth token (xoxb-...)
#   ERRANDER_SLACK_CHANNEL_ID    Approvals channel ID (C0123456789)
#   ERRANDER_LLM_BASE_URL        vLLM endpoint (http://10.0.1.5:8000/v1)
#   ERRANDER_AUDIT_DB_URL        PostgreSQL URL (postgresql://errander:errander@localhost:5432/errander)
#
# Optional overrides:
#   ERRANDER_LLM_API_KEY         vLLM API key (default: "not-needed")
#   ERRANDER_APPROVAL_TIMEOUT    Approval timeout in seconds
#   ERRANDER_METRICS_PORT        Prometheus metrics port
#   ERRANDER_DRY_RUN             Default to dry-run mode (true/false)

agent:
  # --- Approval ---
  # How long to wait for the operator's web UI decision before auto-rejecting.
  # (Slack only notifies and links — decisions happen at /ui/approvals.)
  # Default: 1800s (30 minutes). Increase for large batches / slow reviewers.
  approval_timeout_seconds: 1800

  # --- SSH ---
  # Max seconds to wait for a single SSH command to complete.
  # Increase for slow VMs or large package downloads.
  ssh_command_timeout_seconds: 300

  # How many times to retry an SSH connection on failure.
  ssh_reconnect_attempts: 3

  # Backoff intervals (seconds) between reconnect attempts.
  # 3 attempts: wait 5s, then 15s, then 45s.
  ssh_reconnect_backoff: [5, 15, 45]

  # --- Safety ---
  # Abort the batch if this fraction of targets fail pre-flight checks.
  # 0.5 = abort if ≥50% of targets are unreachable.
  fleet_failure_threshold: 0.5

  # How long a VM lock can be held before it's considered stale.
  # A stale lock from a previous crashed run is automatically released.
  vm_lock_ttl_seconds: 7200  # 2 hours

  # Graceful shutdown: wait this many seconds for in-flight actions to complete.
  graceful_shutdown_timeout_seconds: 120

  # --- Rolling Updates ---
  # Process VMs in waves instead of all at once.
  # 100 = all VMs in a single wave (default behavior, no change).
  # 25 = 25% per wave — 8 VMs becomes 4 waves of 2.
  rolling_update_percentage: 100

  # Abort remaining waves if this fraction of a wave's VMs fail health check.
  # 0.5 = abort if >50% fail.
  wave_failure_threshold: 0.5

  # SSH command run on each VM after a wave completes to verify health.
  health_check_command: "echo ok"

  # --- Canary ---
  # Run 1 VM first, health-check it strictly, then roll out to the rest.
  # If the canary fails, remaining waves are aborted.
  canary_enabled: false

  # Stricter health check for the canary VM (wave 0).
  # "systemctl is-system-running" returns non-zero if degraded.
  canary_health_check_command: "systemctl is-system-running"

  # --- Drift Detection ---
  # Compare each VM's discovered state against a stored baseline before executing.
  # Drift types: OS version, disk usage (>20%), docker availability, reboot, packages (>5).
  drift_detection_enabled: false

  # When true: skip VM execution if drift is detected.
  # When false: log the drift but continue with maintenance.
  drift_abort_on_detection: false

slack:
  # Slack channel for approval notifications and batch reports.
  # (Notify-and-link only — decisions are recorded in the web UI.)
  # Channel ID set via ERRANDER_SLACK_CHANNEL_ID env var.
  approvals_channel_env: ERRANDER_SLACK_CHANNEL_ID

  # Legacy reaction-poll interval — accepted but ignored since R2
  # (the Slack reaction decision channel was removed). Safe to delete.
  # poll_interval_seconds: 30

# Optional Prometheus adapter. When set, CPU/memory/load metrics from node_exporter
# are included in --probe-now digests and --ask analysis context.
# Leave unset (or empty) to disable — probe and --ask work without it.
# Queries instance=~"<VM_IP>:.*" so no per-VM config needed.
#
# prometheus_base_url: "http://prometheus.internal:9090"

# ELK / Elasticsearch (optional — Layer A investigation data source)
# Leave blank to disable. Activates automatically when elk_base_url is set.
# Queries error/warn log events per VM using ECS fields (Filebeat 7+/8).
#
# elk_base_url: "http://elasticsearch:9200"
# elk_api_key: ""                             # Elasticsearch API key (optional)
# elk_index_pattern: "filebeat-*,logstash-*"  # Comma-separated index patterns

llm:
  # Required: model ID (provider-specific — see docs/LLM-PROVIDERS.md)
  # Examples: "Qwen/Qwen3-8B-AWQ" (vLLM), "gpt-4o-mini" (OpenAI),
  #           "claude-sonnet-4-6" (Anthropic), "llama-3.3-70b-versatile" (Groq)
  model: "Qwen/Qwen3-8B-AWQ"

  # Sampling temperature. 0.0 = deterministic, 0.1 = low variance (default),
  # up to 2.0 for high variance. Keep low for structured JSON responses.
  temperature: 0.1

  # Seconds to wait for a response before timing out.
  # Self-hosted T4 GPU needs ~30-60s. Cloud APIs are typically < 10s.
  timeout_seconds: 60

  # Number of retries on timeout/connection errors.
  # No retry on 4xx/5xx (those aren't transient).
  max_retries: 2

# Per-environment cron schedules.
# Standard 5-field cron: minute hour day month day_of_week
# Leave null to disable scheduled runs for an environment (manual trigger only).
schedules:
  production:
    maintenance: "0 2 * * tue,thu"   # 02:00 UTC on Tuesdays and Thursdays
    # signals: "0 6 * * *"           # Daily probe at 06:00 UTC (optional)
    #   Runs disk-growth, drift, and failed-login probes against all VMs.
    #   Posts a digest to Slack. Read-only — no maintenance actions executed.
    #   CLI equivalent: uv run python -m errander --probe-now production

  staging:
    maintenance: "0 22 * * mon-fri"  # 22:00 UTC weeknights
    # signals: "0 7 * * *"           # Daily probe at 07:00 UTC

  dev:
    maintenance: "0 9 * * mon-fri"   # 09:00 UTC weekday mornings
    # signals: "0 8 * * mon-fri"     # Probe on weekday mornings before maintenance window

# SRE signal collection — runs alongside every maintenance batch.
# All checks default to enabled. Set enabled: false to disable globally,
# or use disable_failed_login_check: true per-host in inventory.yaml to opt
# individual VMs out of the failed login probe.
sre_signals:

  # --- Operational checks (wired into the preflight/postflight phases) ---
  # Lock-file check: abort if another batch already holds the VM lock.
  preflight_lock_check: true

  # Reboot-required detection: flag VMs needing a reboot after patching.
  reboot_required_check: true

  # Service health regression: compare service states pre/post maintenance.
  # Which services are checked is controlled by critical_services in inventory.yaml.
  service_health_check: true

  # --- Disk growth trend ---
  disk_growth_trend:
    enabled: true

    # Alert when disk usage grows by ≥ this many percentage points over window_days.
    threshold_pct: 10

    # How many days of history to look back when computing the growth rate.
    window_days: 7

    # How long to retain historical disk-usage snapshots (days).
    retention_days: 90

  # --- Configuration drift signals ---
  # Compares each VM's discovered state against a stored baseline.
  # A changed baseline emits a DRIFT_KIND_CHANGED audit event and appears
  # in the batch report grouped by kind.
  drift:
    sudoers: true           # /etc/sudoers + /etc/sudoers.d/*
    authorized_keys: true   # ~/.ssh/authorized_keys for all users
    listening_ports: true   # TCP listening ports (PIDs stripped — restarts are not drift)
    scheduled_jobs: true    # crontab -l + /etc/cron.d/*

    # Truncate unified diffs longer than this line count in the report.
    diff_max_lines: 50

    # Number of baseline captures to retain per VM+kind in the database.
    retention_captures: 30

  # --- Failed SSH login snapshot ---
  failed_ssh_logins:
    enabled: true

    # Look back this many hours when counting failed login attempts.
    # Shorter windows reduce noise; longer windows catch slow brute-force scans.
    window_hours: 24
